name: Update Portfolio Dashboard

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch live prices
        run: python scripts/fetch_prices.py

      - name: Generate dashboard
        run: python scripts/generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "portfolio-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/portfolio.json dashboard/index.html
          git diff --cached --quiet || git commit -m "update portfolio $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
